version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-patch:
        dependency-type: production
        update-types:
          - patch
      production-minor:
        dependency-type: production
        update-types:
          - minor
    ignore:
      # Noisy transitive-only deps — not directly controllable
      - dependency-name: minimatch
      - dependency-name: serialize-javascript

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    groups:
      actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
